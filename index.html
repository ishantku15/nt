<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore free educational batches and high-quality study materials on Asmultiverse. Access classes for 9th, 10th, 11th, 12th and competitive exams.">
  <title>Asmultiverse | Next Toppers Free Batches</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-400: #4ade80;
      --green-500: #22c55e;
      --green-600: #16a34a;
      --emerald-400: #34d399;
      --stone-800: #292524;
      --stone-900: #1c1917;
      --bg-primary: #000000;
      --bg-card: rgba(28, 25, 23, 0.4);
      --border-card: #292524;
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== AMBIENT GLOW ===== */
    .ambient-glow {
      position: fixed;
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(34, 197, 94, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
    }

    /* ===== MAIN CONTAINER ===== */
    .page-container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ===== HEADER ===== */
    .page-header {
      text-align: center;
      padding: 56px 0 32px;
    }

    .page-header h1 {
      font-size: 2.75rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .text-green-gradient {
      background: linear-gradient(135deg, var(--green-400), var(--emerald-400), var(--green-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.3)); }
      50% { filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.6)); }
    }

    .page-header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== SEARCH BAR ===== */
    .search-bar-wrapper {
      display: flex;
      gap: 10px;
      max-width: 560px;
      margin: 0 auto 36px;
    }

    .search-input-group {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(28, 25, 23, 0.6);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.925rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: var(--green-500);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }

    .filter-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 18px;
      background: rgba(28, 25, 23, 0.6);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--green-500);
      color: var(--text-primary);
    }

    .filter-btn svg {
      width: 16px;
      height: 16px;
    }

    .filter-btn.active {
      border-color: var(--green-500);
      color: var(--green-400);
      background: rgba(34, 197, 94, 0.06);
    }

    /* ===== FILTER MODAL ===== */
    .filter-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .filter-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .filter-modal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1001;
      background: #0f1115;
      border-top: 1px solid var(--stone-800);
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 36px;
      transform: translate3d(0, 100%, 0);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      will-change: transform;
      max-width: 560px;
      margin: 0 auto;
      max-height: 80vh;
      overflow-y: auto;
    }

    .filter-overlay.open .filter-modal {
      transform: translate3d(0, 0, 0);
    }

    .filter-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .filter-modal-header h3 {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .filter-close-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .filter-close-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
    }

    .filter-close-btn svg {
      width: 18px;
      height: 18px;
    }

    .filter-section {
      margin-bottom: 24px;
    }

    .filter-section label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill-btn {
      padding: 8px 16px;
      border-radius: 9999px;
      border: 1px solid var(--stone-800);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.825rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .pill-btn:hover {
      border-color: rgba(34, 197, 94, 0.4);
      color: var(--text-primary);
    }

    .pill-btn.active {
      background: var(--green-500);
      border-color: var(--green-500);
      color: #000;
      font-weight: 600;
    }

    .filter-submit-btn {
      width: 100%;
      padding: 14px 24px;
      background: var(--green-500);
      border: none;
      border-radius: 12px;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      margin-top: 4px;
    }

    .filter-submit-btn:hover {
      background: var(--green-400);
    }

    .filter-submit-btn:active {
      transform: scale(0.98);
    }

    /* ===== BATCH GRID ===== */
    .batch-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding-bottom: 24px;
    }

    @media (min-width: 540px) {
      .batch-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 960px) {
      .batch-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ===== BATCH CARD ===== */
    .batch-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      will-change: transform;
      cursor: pointer;
      opacity: 0;
      transform: translate3d(0, 30px, 0);
    }

    .batch-card.visible {
      opacity: 1;
      transform: translate3d(0, 0, 0);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .batch-card:hover {
      border-color: rgba(34, 197, 94, 0.4);
      transform: translate3d(0, -4px, 0);
      box-shadow: 0 12px 40px rgba(34, 197, 94, 0.06);
    }

    .card-thumb-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      overflow: hidden;
      background: #111;
    }

    .card-thumb-wrapper img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .batch-card:hover .card-thumb-wrapper img {
      transform: scale(1.05);
    }

    /* Play overlay */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .batch-card:hover .play-overlay {
      opacity: 1;
    }

    .play-circle {
      width: 52px;
      height: 52px;
      background: rgba(34, 197, 94, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
    }

    .play-circle svg {
      width: 22px;
      height: 22px;
      fill: #000;
      margin-left: 2px;
    }

    /* Bookmark / Heart button */
    .bookmark-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 5;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .bookmark-btn:hover {
      background: rgba(0, 0, 0, 0.75);
      transform: scale(1.1);
    }

    .bookmark-btn svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      transition: fill 0.2s ease, stroke 0.2s ease;
    }

    .bookmark-btn.enrolled svg {
      fill: var(--green-400);
      stroke: var(--green-400);
    }

    /* FREE badge */
    .free-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 4px 10px;
      background: var(--green-500);
      color: #000;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      z-index: 5;
    }

    /* Card body */
    .card-body {
      padding: 14px 16px 16px;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .free-access-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--green-400);
      font-weight: 500;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      background: var(--green-400);
      border-radius: 50%;
      animation: pulseDot 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(74, 222, 128, 0); }
    }

    .study-link {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--green-400);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .study-link:hover {
      color: var(--green-500);
      text-decoration: underline;
    }

    /* ===== LOAD MORE ===== */
    .load-more-wrapper {
      text-align: center;
      padding: 32px 0 64px;
    }

    .load-more-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: transparent;
      border: 1px solid var(--stone-800);
      border-radius: 12px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .load-more-btn:hover {
      border-color: var(--green-500);
      color: var(--green-400);
      background: rgba(34, 197, 94, 0.04);
    }

    .load-more-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 64px 16px;
      display: none;
    }

    .empty-state.show {
      display: block;
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ===== RESULT COUNT ===== */
    .result-count {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      font-weight: 500;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .page-header { padding: 40px 0 24px; }
      .page-header h1 { font-size: 2rem; }
      .page-header .subtitle { font-size: 0.9rem; }
      .search-bar-wrapper { max-width: 100%; }
      .filter-modal { max-width: 100%; }
    }

    @media (min-width: 641px) and (max-width: 959px) {
      .page-header h1 { font-size: 2.4rem; }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>

      {id:59,title:'PRARAMBH HUMANITIES 12TH 2025-26',thumbnail:'https://dxixtlyravvxx.cloudfront.net/540/admin_v1/bundle_management/course/205624828613_Prarambh%20BATCh%20Humanities%2012.jpg'}

    // ===================================================================
    //  STATE
    // ===================================================================
    const CARDS_PER_PAGE = 4;
    let currentPage = 1;
    let filteredBatches = [];
    let activeYear = 'all';
    let activeClass = 'all';

    // ===================================================================
    //  ENROLLMENT / BOOKMARK HELPERS
    // ===================================================================
    function getEnrollments() {
      try {
        const raw = localStorage.getItem('asm_enrollments_nt');
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function setEnrollments(arr) {
      localStorage.setItem('asm_enrollments_nt', JSON.stringify(arr));
    }

    function isEnrolled(id) {
      return getEnrollments().includes(id);
    }

    function toggleEnrollment(id) {
      let enrollments = getEnrollments();
      if (enrollments.includes(id)) {
        enrollments = enrollments.filter(e => e !== id);
      } else {
        enrollments.push(id);
      }
      setEnrollments(enrollments);
      return enrollments.includes(id);
    }

    // ===================================================================
    //  CLASS DETECTION (from title)
    // ===================================================================
    function detectClass(title) {
      const t = title.toUpperCase();
      if (/\b9TH\b/.test(t) || /\b9\b/.test(t)) return '9th';
      if (/\b10TH\b/.test(t) || /\b10\b/.test(t)) return '10th';
      if (/\b11TH\b/.test(t) || /\b11\b/.test(t)) return '11th';
      if (/\b12TH\b/.test(t) || /\b12\b/.test(t)) return '12th';
      return 'others';
    }

    // ===================================================================
    //  FILTER + SEARCH LOGIC
    // ===================================================================
    function getAllBatches() {
      return [
        ...batches2026.map(b => ({ ...b, year: '2026-27' })),
        ...batches2025.map(b => ({ ...b, year: '2025-26' }))
      ];
    }

    function applyFilters() {
      const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
      let all = getAllBatches();

      // Year filter
      if (activeYear !== 'all') {
        all = all.filter(b => b.year === activeYear);
      }

      // Class filter
      if (activeClass !== 'all') {
        all = all.filter(b => detectClass(b.title) === activeClass);
      }

      // Search filter
      if (searchQuery) {
        all = all.filter(b => b.title.toLowerCase().includes(searchQuery));
      }

      // Sort enrolled/bookmarked to top
      const enrollments = getEnrollments();
      all.sort((a, b) => {
        const aEnrolled = enrollments.includes(a.id) ? 1 : 0;
        const bEnrolled = enrollments.includes(b.id) ? 1 : 0;
        return bEnrolled - aEnrolled;
      });

      filteredBatches = all;
      currentPage = 1;
      renderBatches();
    }

    // ===================================================================
    //  RENDER
    // ===================================================================
    function renderBatches() {
      const grid = document.getElementById('batchGrid');
      const loadMoreWrapper = document.getElementById('loadMoreWrapper');
      const emptyState = document.getElementById('emptyState');
      const resultCount = document.getElementById('resultCount');

      grid.innerHTML = '';

      if (filteredBatches.length === 0) {
        emptyState.classList.add('show');
        loadMoreWrapper.style.display = 'none';
        resultCount.textContent = '';
        return;
      }

      emptyState.classList.remove('show');

      const visibleCount = currentPage * CARDS_PER_PAGE;
      const visibleBatches = filteredBatches.slice(0, visibleCount);
      const totalAll = getAllBatches().length;

      resultCount.textContent = filteredBatches.length === totalAll
        ? `Showing ${Math.min(visibleCount, filteredBatches.length)} of ${filteredBatches.length} batches`
        : `${filteredBatches.length} batch${filteredBatches.length !== 1 ? 'es' : ''} found`;

      visibleBatches.forEach((batch, index) => {
        const card = createBatchCard(batch, index);
        grid.appendChild(card);
      });

      // Show/hide load more
      if (visibleCount >= filteredBatches.length) {
        loadMoreWrapper.style.display = 'none';
      } else {
        loadMoreWrapper.style.display = 'block';
      }

      // Staggered fade-in animation
      requestAnimationFrame(() => {
        const cards = grid.querySelectorAll('.batch-card');
        cards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add('visible');
          }, i * 50);
        });
      });
    }

    function createBatchCard(batch, index) {
      const card = document.createElement('div');
      card.className = 'batch-card';
      card.setAttribute('data-id', batch.id);

      const enrolled = isEnrolled(batch.id);

      card.innerHTML = `
        <div class="card-thumb-wrapper">
          <img src="${batch.thumbnail}" alt="${batch.title}" loading="lazy" decoding="async">
          <div class="play-overlay">
            <div class="play-circle">
              <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
          </div>
          <button class="bookmark-btn ${enrolled ? 'enrolled' : ''}" data-batch-id="${batch.id}" aria-label="Bookmark this batch" onclick="event.stopPropagation(); handleBookmark(this, ${batch.id})">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
          </button>
          <span class="free-badge">FREE</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">${batch.title}</h3>
          <div class="card-footer">
            <div class="free-access-tag">
              <span class="pulse-dot"></span>
              Free Access
            </div>
            <a href="batch.html?id=${batch.id}" class="study-link" onclick="event.stopPropagation()">Study →</a>
          </div>
        </div>
      `;

      card.addEventListener('click', () => {
        window.location.href = `batch.html?id=${batch.id}`;
      });

      return card;
    }

    // ===================================================================
    //  BOOKMARK HANDLER
    // ===================================================================
    function handleBookmark(btn, batchId) {
      const nowEnrolled = toggleEnrollment(batchId);
      if (nowEnrolled) {
        btn.classList.add('enrolled');
      } else {
        btn.classList.remove('enrolled');
      }
    }

    // ===================================================================
    //  LOAD MORE
    // ===================================================================
    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      currentPage++;
      renderBatches();
    });

    // ===================================================================
    //  SEARCH INPUT
    // ===================================================================
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        applyFilters();
      }, 200);
    });

    // ===================================================================
    //  FILTER MODAL
    // ===================================================================
    const filterOverlay = document.getElementById('filterOverlay');
    const filterToggleBtn = document.getElementById('filterToggleBtn');
    const filterCloseBtn = document.getElementById('filterCloseBtn');
    const filterSubmitBtn = document.getElementById('filterSubmitBtn');

    function openFilterModal() {
      filterOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeFilterModal() {
      filterOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    filterToggleBtn.addEventListener('click', openFilterModal);
    filterCloseBtn.addEventListener('click', closeFilterModal);

    // Close on overlay click (but not on modal itself)
    filterOverlay.addEventListener('click', (e) => {
      if (e.target === filterOverlay) closeFilterModal();
    });

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && filterOverlay.classList.contains('open')) {
        closeFilterModal();
      }
    });

    // Year pill buttons
    document.getElementById('yearPills').addEventListener('click', (e) => {
      const btn = e.target.closest('.pill-btn');
      if (!btn) return;
      document.querySelectorAll('#yearPills .pill-btn').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activeYear = btn.dataset.value;
    });

    // Class pill buttons
    document.getElementById('classPills').addEventListener('click', (e) => {
      const btn = e.target.closest('.pill-btn');
      if (!btn) return;
      document.querySelectorAll('#classPills .pill-btn').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activeClass = btn.dataset.value;
    });

    // Show Results button
    filterSubmitBtn.addEventListener('click', () => {
      closeFilterModal();
      applyFilters();

      // Toggle active state on filter button
      const hasFilter = activeYear !== 'all' || activeClass !== 'all';
      filterToggleBtn.classList.toggle('active', hasFilter);
    });

    // ===================================================================
    //  INIT
    // ===================================================================
    applyFilters();
  </script>
