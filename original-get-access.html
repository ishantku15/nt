@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap');

@keyframes lc-pulse-ring {
  0%   { transform: scale(0.85); opacity: 0.8; }
  100% { transform: scale(2.8);  opacity: 0;   }
}
@keyframes lc-led-blink {
  0%,42%,58%,100% { opacity: 1;   }
  50%             { opacity: 0.15; }
}
@keyframes lc-sweep {
  0%   { left: -80%; }
  100% { left: 140%; }
}
@keyframes lc-skel-shimmer {
  0%   { background-position: -900px 0; }
  100% { background-position:  900px 0; }
}
@keyframes lc-signal-bar {
  0%,100% { opacity: 0.25; transform: scaleY(0.45); }
  50%      { opacity: 1;   transform: scaleY(1);     }
}
@keyframes lc-timer-glow {
  0%,100% { text-shadow: 0 0 6px rgba(96,165,250,0.5), 0 0 14px rgba(96,165,250,0.2); }
  50%      { text-shadow: 0 0 12px rgba(96,165,250,0.9), 0 0 28px rgba(96,165,250,0.4); }
}
@keyframes lc-card-enter {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes lc-dash-move {
  to { stroke-dashoffset: -20; }
}
@keyframes lc-tag-enter {
  from { opacity: 0; transform: translateX(-8px) scale(0.85); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes lc-gentle-bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

.lc-live-dot-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.lc-live-dot-wrap::before,
.lc-live-dot-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(239,68,68,0.5);
  animation: lc-pulse-ring 1.8s ease-out infinite;
}
.lc-live-dot-wrap::after { animation-delay: 0.9s; }
.lc-live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #ef4444;
  position: relative; z-index: 1;
  box-shadow: 0 0 5px rgba(239,68,68,1), 0 0 12px rgba(239,68,68,0.5);
  animation: lc-led-blink 2.8s ease-in-out infinite;
}

.lc-sig-bar { animation: lc-signal-bar 1s ease-in-out infinite; }
.lc-sig-bar:nth-child(1) { animation-delay: 0s; }
.lc-sig-bar:nth-child(2) { animation-delay: 0.18s; }
.lc-sig-bar:nth-child(3) { animation-delay: 0.36s; }
.lc-sig-bar:nth-child(4) { animation-delay: 0.54s; }

.lc-skel-card {
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid rgba(59,130,246,0.08);
  background: rgba(10,20,45,0.4);
}
.lc-skel-thumb {
  aspect-ratio: 16/9;
  background: linear-gradient(90deg,
    rgba(30,58,138,0.08) 0%,
    rgba(30,58,138,0.04) 20%,
    rgba(59,130,246,0.12) 50%,
    rgba(30,58,138,0.04) 80%,
    rgba(30,58,138,0.08) 100%
  );
  background-size: 900px 100%;
  animation: lc-skel-shimmer 2s ease-in-out infinite;
}
.lc-skel-line {
  border-radius: 8px;
  background: linear-gradient(90deg,
    rgba(30,58,138,0.06) 0%,
    rgba(30,58,138,0.03) 20%,
    rgba(59,130,246,0.1) 50%,
    rgba(30,58,138,0.03) 80%,
    rgba(30,58,138,0.06) 100%
  );
  background-size: 900px 100%;
  animation: lc-skel-shimmer 2s ease-in-out infinite;
}
.lc-skel-line.d1 { animation-delay: 0.18s; }
.lc-skel-line.d2 { animation-delay: 0.36s; }

.lc-live-badge {
  animation: lc-tag-enter 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.lc-soon-badge {
  animation: lc-tag-enter 0.4s cubic-bezier(0.16,1,0.3,1) 0.05s both;
}

.lc-timer-digit {
  animation: lc-timer-glow 2.2s ease-in-out infinite;
  font-family: 'JetBrains Mono', monospace;
}
.lc-timer-digit:nth-child(3) { animation-delay: 0.3s; }
.lc-timer-digit:nth-child(5) { animation-delay: 0.6s; }

.lc-watch-btn {
  position: relative;
  overflow: hidden;
}
.lc-watch-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 45%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
  transform: skewX(-15deg);
}
.lc-watch-btn:hover::after {
  animation: lc-sweep 0.6s ease forwards;
}

.lc-card {
  animation: lc-card-enter 0.55s cubic-bezier(0.16,1,0.3,1) both;
  opacity: 0;
}
.lc-card:nth-child(1) { animation-delay: 0.04s; }
.lc-card:nth-child(2) { animation-delay: 0.08s; }
.lc-card:nth-child(3) { animation-delay: 0.12s; }
.lc-card:nth-child(4) { animation-delay: 0.16s; }
.lc-card:nth-child(5) { animation-delay: 0.20s; }
.lc-card:nth-child(6) { animation-delay: 0.24s; }

.lc-img-blur {
  position: absolute;
  inset: -4px;
  filter: blur(12px) saturate(1.2);
  transform: scale(1.1);
  opacity: 0.35;
  object-fit: cover;
  width: 100%; height: 100%;
}
.lc-img-main {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  object-fit: contain;
  transition: transform 0.65s cubic-bezier(0.16,1,0.3,1);
}
.lc-img-main:hover { transform: scale(1.04); }

.lc-orbit {
  animation: lc-card-enter 0.4s ease both;
}
